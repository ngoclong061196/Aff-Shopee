<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Link Shopee - Ngọc Long Multi-Campaign</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: #ffbca7; /* Màu nền hồng nhạt giống ảnh mẫu */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Phần Logo phía trên */
        .logo-area {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-text {
            font-size: 26px;
            font-weight: 700;
            color: #ff5722;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .sub-logo {
            background: rgba(255, 255, 255, 0.4);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: #d43f11;
            font-weight: 500;
            margin-top: 6px;
            display: inline-block;
        }
        
        /* Card chứa nội dung chính */
        .card {
            background: #ffffff;
            width: 100%;
            max-width: 580px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            padding: 24px;
        }

        /* THANH CHỌN CHIẾN DỊCH (TABS) */
        .campaign-tabs {
            display: flex;
            background: #f1f3f5;
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 20px;
            gap: 4px;
        }

        .tab-item {
            flex: 1;
            text-align: center;
            padding: 10px 5px;
            font-size: 14px;
            font-weight: 500;
            color: #495057;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .tab-item:hover {
            background: rgba(255, 87, 34, 0.1);
            color: #ff5722;
        }

        .tab-item.active {
            background: #ff5722;
            color: white;
            box-shadow: 0 2px 6px rgba(255, 87, 34, 0.3);
        }

        /* Đổi màu icon FontAwesome khi tab active để dễ nhìn trên nền cam */
        .tab-item.active i {
            background: white !important;
            -webkit-background-clip: text !important;
            -webkit-text-fill-color: #ff5722 !important;
            color: #ff5722 !important;
        }

        /* CSS riêng để xử lý đổi màu Logo Shopee dạng SVG khi active */
        .tab-item.active .shopee-svg {
            fill: white !important;
        }

        .input-title {
            font-size: 15px;
            font-weight: 500;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* Ô nhập liệu có nút Paste bên trong */
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            padding: 14px 60px 14px 16px;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            font-size: 15px;
            background: #eef3f9;
            outline: none;
            color: #333;
        }
        
        .btn-paste {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: #495057;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            padding: 5px;
        }

        .btn-paste:hover {
            color: #ff5722;
        }
        
        /* Nút Tạo Link Ngay màu cam */
        .btn-submit {
            width: 100%;
            background: #ff5722;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
            margin-bottom: 16px;
        }

        .btn-submit:hover {
            background: #e04818;
        }

        /* Vùng hiển thị ảnh Voucher trực quan */
        .voucher-preview {
            display: none; /* Mặc định ẩn, chỉ hiện ở tab IG */
            width: 100%;
            margin-top: 10px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px dashed #ff5722;
            padding: 4px;
            background: #fff5f2;
        }

        .voucher-preview img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 6px;
        }

        /* Khối hiển thị kết quả bo viền xám giống ảnh */
        .result-container {
            display: none;
            margin-top: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            animation: fadeIn 0.3s ease;
        }

        /* Hàng chứa các nút chức năng chính */
        .action-row {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 16px;
        }

        /* Nút Mua Ngay màu xanh lá */
        .btn-mua-ngay {
            background: #00d27a;
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 6px rgba(0,210,122,0.2);
        }

        .btn-mua-ngay:hover {
            background: #00b96b;
        }

        /* Nút Sao chép màu cam viền đen nhẹ */
        .btn-copy {
            background: #ff5722;
            color: white;
            border: 1px solid #d43f11;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .btn-copy:hover {
            background: #e04818;
        }

        /* Nút chia sẻ lên Facebook */
        .btn-facebook {
            width: 100%;
            background: #3b5998;
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-facebook:hover {
            background: #2d4373;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="logo-area">
        <div class="logo-text">
            <i class="fa-solid fa-link"></i> Tạo Link Tổng Hợp
        </div>
        <div class="sub-logo">Ngọc Long Miki</div>
    </div>

    <div class="card">
        <div class="campaign-tabs">
            <div class="tab-item active" onclick="switchCampaign('pure')" id="tab-pure">
                <svg class="shopee-svg" viewBox="0 0 24 24" width="16" height="16" style="fill: #EE4D2D; transition: fill 0.2s;"><path d="M22.5 10c-.1-.6-.5-1.1-1.1-1.4l-3.4-1.3c-.3-.1-.6-.2-1-.2H7c-.4 0-.7.1-1 .2L2.6 8.6c-.6.3-1 .8-1.1 1.4L1 14.5c-.1 1.6.8 3.1 2.3 3.7l7.5 3.3c.7.3 1.6.3 2.3 0l7.5-3.3c1.5-.6 2.4-2.1 2.3-3.7L22.5 10zM12 18.5c-2.5 0-4.5-2-4.5-4.5s2-4.5 4.5-4.5 4.5 2 4.5 4.5-2 4.5-4.5 4.5z"/></svg>
                AFF Đơn Thuần
            </div>
            <div class="tab-item" onclick="switchCampaign('fb')" id="tab-fb">
                <i class="fa-brands fa-facebook" style="color: #1877F2;"></i> Mã Facebook
            </div>
            <div class="tab-item" onclick="switchCampaign('ig')" id="tab-ig">
                <i class="fa-brands fa-instagram" style="background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i> Mã Instagram
            </div>
        </div>

        <div class="input-title">
            <i class="fa-solid fa-briefcase"></i> <span id="inputLabel">Link sản phẩm Shopee làm Affiliate đơn thuần</span>
        </div>
        
        <div class="input-wrapper">
            <input type="text" id="shopeeUrlInput" placeholder="https://shopee.vn/...">
            <button class="btn-paste" onclick="pasteClipboard()" title="Dán nhanh">
                <i class="fa-solid fa-copy"></i>
            </button>
        </div>

        <button class="btn-submit" onclick="generateMikiLink()">
            <i class="fa-solid fa-pencil"></i> Tạo Link Ngay
        </button>

        <!-- KHỐI HIỂN THỊ HÌNH ẢNH VOUCHER THỰC TẾ -->
        <div class="voucher-preview" id="voucherImageBlock">
            <img src="instagram.jpg" alt="Mã giảm giá Instagram">
        </div>

        <div class="result-container" id="resultContainer">
            <div class="action-row">
                <a href="#" id="linkMuaNgay" class="btn-mua-ngay" target="_blank">
                    <i class="fa-solid fa-cart-shopping"></i> Mua Ngay
                </a>
                <button id="btnCopy" class="btn-copy" onclick="copyTargetLink()">
                    <i class="fa-solid fa-copy"></i> Sao chép
                </button>
            </div>

            <button class="btn-facebook" onclick="shareToFacebook()">
                <i class="fa-brands fa-facebook"></i> Chia sẻ lên Facebook
            </button>
        </div>
    </div>

<script>
    const MY_AFFILIATE_ID = "17322830423"; 
    
    let currentCampaign = "pure";
    let linkKetQua = "";

    function switchCampaign(type) {
        currentCampaign = type;
        
        document.querySelectorAll('.tab-item').forEach(tab => tab.classList.remove('active'));
        document.getElementById(`tab-${type}`).classList.add('active');
        
        const label = document.getElementById('inputLabel');
        const voucherBlock = document.getElementById('voucherImageBlock');

        if(type === 'pure') {
            label.innerText = "Link sản phẩm Shopee làm Affiliate đơn thuần";
            voucherBlock.style.display = 'none';
        }
        if(type === 'fb') {
            label.innerText = "Link sản phẩm Shopee cần áp mã FB";
            voucherBlock.style.display = 'none';
        }
        if(type === 'ig') {
            label.innerText = "Link sản phẩm Shopee cần áp mã IG";
            voucherBlock.style.display = 'block'; // Hiện ảnh voucher khi chọn tab IG
        }

        document.getElementById('resultContainer').style.display = 'none';
    }

    async function pasteClipboard() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById('shopeeUrlInput').value = text;
        } catch (err) {
            alert("Vui lòng cho phép quyền truy cập bộ nhớ tạm hoặc tự dán thủ công nha!");
        }
    }

    function generateMikiLink() {
        const inputUrl = document.getElementById('shopeeUrlInput').value.trim();
        if(!inputUrl) return alert("Bạn chưa nhập link sản phẩm Shopee!");

        let cleanUrl = inputUrl.split('?')[0];

        if (currentCampaign === 'pure') {
            const encoded = encodeURIComponent(inputUrl);
            linkKetQua = `https://s.shopee.vn/an_redir?origin_link=${encoded}&affiliate_id=${MY_AFFILIATE_ID}`;
        } 
        else if (currentCampaign === 'fb') {
            const facebookToken = "&credential_token=TOKEN_MÃ_FB_SĂN_ĐƯỢC_Ở_ĐÂY&uls_trackid=TRACKID_FB_Ở_ĐÂY";
            linkKetQua = `${cleanUrl}?utm_source=an_${MY_AFFILIATE_ID}&mmp_pid=an_${MY_AFFILIATE_ID}&utm_medium=affiliates&utm_campaign=-&utm_content=product----${facebookToken}`;
        }
        else if (currentCampaign === 'ig') {
            const instagramToken = "&credential_token=8wEwiDL7Z2Us4W7ZvDpoeD6hrmpQqii6GUTr2TpSgu&uls_trackid=55tob7ui00cq";
            linkKetQua = `${cleanUrl}?utm_source=an_${MY_AFFILIATE_ID}&mmp_pid=an_${MY_AFFILIATE_ID}&utm_medium=affiliates&utm_campaign=-&utm_content=product----${instagramToken}`;
        } 

        document.getElementById('linkMuaNgay').href = linkKetQua;
        document.getElementById('resultContainer').style.display = 'block';
    }

    function copyTargetLink() {
        if(!linkKetQua) return;
        navigator.clipboard.writeText(linkKetQua).then(() => {
            const btnCopy = document.getElementById('btnCopy');
            btnCopy.innerHTML = `<i class="fa-solid fa-check"></i> Đã sao chép`;
            btnCopy.style.background = "#28a745";
            btnCopy.style.borderColor = "#1e7e34";

            setTimeout(() => {
                btnCopy.innerHTML = `<i class="fa-solid fa-copy"></i> Sao chép`;
                btnCopy.style.background = "#ff5722";
                btnCopy.style.borderColor = "#d43f11";
            }, 2000);
        });
    }

    function shareToFacebook() {
        if(!linkKetQua) return;
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(linkKetQua)}`, '_blank');
    }
</script>
</body>
</html>
