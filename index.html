<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Link Shopee - Ngọc Long Affiliate</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: #ffbca7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            color: #ff5722;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .sub-logo {
            background: rgba(255, 255, 255, 0.4);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: #d43f11;
            font-weight: 500;
            margin-top: 6px;
            display: inline-block;
        }
        
        .card {
            background: #ffffff;
            width: 100%;
            max-width: 580px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            padding: 24px;
        }

        .input-title {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            padding: 14px 60px 14px 16px;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            font-size: 15px;
            background: #eef3f9;
            outline: none;
            color: #333;
        }
        
        .btn-paste {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: #495057;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            padding: 5px;
        }

        .btn-paste:hover {
            color: #ff5722;
        }
        
        .btn-submit {
            width: 100%;
            background: #ff5722;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
            margin-bottom: 16px;
        }

        .btn-submit:hover {
            background: #e04818;
        }

        .result-container {
            display: none;
            background: #f8f9fa;
            border: 1px solid #eef0f2;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 16px;
            align-items: center;
            justify-content: space-between;
            animation: fadeIn 0.3s ease;
        }

        .result-status {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .result-status i.fa-circle-check {
            color: #28a745;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-mua-ngay {
            background: #00d27a;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 6px rgba(0,210,122,0.15);
            transition: background 0.2s;
        }

        .btn-mua-ngay:hover {
            background: #00b96b;
        }

        .btn-copy {
            background: #ffffff;
            color: #ff5722;
            border: 1px solid #ff5722;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-copy:hover {
            background: #ff5722;
            color: #ffffff;
        }

        .instruction-box {
            display: block; 
            background: #f0f4f9;
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
        }

        .instruction-title {
            font-size: 15px;
            font-weight: bold;
            color: #1a1a1a;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .instruction-list {
            list-style: none;
            padding-left: 0;
            margin-bottom: 16px;
        }

        .instruction-list li {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .support-section {
            border-top: 1px dashed #cbd5e1;
            padding-top: 12px;
        }

        .support-title {
            font-size: 14px;
            font-weight: bold;
            color: #475569;
            margin-bottom: 10px;
        }

        .support-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-contact {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .btn-contact:active {
            transform: scale(0.97);
        }

        .btn-zalo {
            background: #0068ff;
        }

        .btn-fb-contact {
            background: #1877f2;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="logo-area">
        <div class="logo-text">
            <i class="fa-solid fa-link"></i> Tạo Link Shopee
        </div>
        <div class="sub-logo" id="subLogoDomain">ngoclong.shpee</div>
    </div>

    <div class="card">
        <div class="input-title">
            <i class="fa-solid fa-lock"></i> <span>Link sản phẩm Shopee làm Affiliate</span>
        </div>
        
        <div class="input-wrapper">
            <input type="text" id="shopeeUrlInput" placeholder="https://shopee.vn/...">
            <button class="btn-paste" onclick="pasteClipboard()" title="Dán nhanh">
                <i class="fa-solid fa-copy"></i>
            </button>
        </div>

        <button class="btn-submit" onclick="generateMikiLink()">
            <i class="fa-solid fa-pencil"></i> Tạo Link Ngay
        </button>

        <div class="result-container" id="resultContainer">
            <div class="result-status">
                <i class="fa-solid fa-circle-check"></i> Đã tạo xong link
            </div>
            <div class="action-buttons">
                <button id="btnCopy" class="btn-copy" onclick="copyTargetLink()">
                    <i class="fa-solid fa-copy"></i> Copy
                </button>
                <a href="#" id="linkMuaNgay" class="btn-mua-ngay" target="_blank">
                    <i class="fa-solid fa-cart-shopping"></i> Mua Ngay
                </a>
            </div>
        </div>

        <div class="instruction-box">
            <div class="instruction-title">
                <i class="fa-solid fa-circle-info"></i> Hướng dẫn
            </div>
            <ul class="instruction-list">
                <li>1. Sau khi tạo link, nhấn <strong>Copy Link</strong> dán vào trình duyệt hoặc nhấn <strong>Mua Ngay</strong>.</li>
                <li>2. Hệ thống tự động chuyển đổi sang link mua hàng Affiliate của bạn.</li>
            </ul>
            
            <div class="support-section">
                <div class="support-title">Hỗ Trợ:</div>
                <div class="support-buttons">
                    <a href="https://zalo.me/0354271372" class="btn-contact btn-zalo" target="_blank">
                        <i class="fa-solid fa-comment-dots" style="font-size: 16px;"></i> Zalo
                    </a>
                    <a href="https://web.facebook.com/share/1BPAvowpu6/?mibextid=wwXIfr&_rdc=1&_rdr" class="btn-contact btn-fb-contact" target="_blank">
                        <i class="fa-brands fa-facebook" style="font-size: 16px;"></i> Facebook
                    </a>
                </div>
            </div>
        </div>
    </div>

<script>
    const MY_AFFILIATE_ID = "17322830423"; 
    let linkKetQua = "";

    window.addEventListener('DOMContentLoaded', () => {
        const host = window.location.hostname;
        if(host && host !== '127.0.0.1' && host !== 'localhost') {
            document.getElementById('subLogoDomain').innerText = host;
        }
    });

    async function pasteClipboard() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById('shopeeUrlInput').value = text;
        } catch (err) {
            alert("Vui lòng cho phép quyền truy cập bộ nhớ tạm nha!");
        }
    }

    function generateMikiLink() {
        const inputUrl = document.getElementById('shopeeUrlInput').value.trim();
        if(!inputUrl) return alert("Bạn chưa nhập link sản phẩm Shopee!");

        let cleanUrl = inputUrl;
        if(inputUrl.includes('?')) {
            cleanUrl = inputUrl.split('?')[0];
        }

        const currentDomain = window.location.origin;
        linkKetQua = `${currentDomain}/api/go?url=${encodeURIComponent(cleanUrl)}&aff_id=${MY_AFFILIATE_ID}`;

        document.getElementById('resultContainer').style.display = 'flex';
        document.getElementById('linkMuaNgay').href = linkKetQua;
    }

    function copyTargetLink() {
        if(!linkKetQua) return;
        navigator.clipboard.writeText(linkKetQua).then(() => {
            const btnCopy = document.getElementById('btnCopy');
            btnCopy.innerHTML = `<i class="fa-solid fa-check"></i> Ok`;
            btnCopy.style.color = "#28a745";
            btnCopy.style.borderColor = "#28a745";

            setTimeout(() => {
                btnCopy.innerHTML = `<i class="fa-solid fa-copy"></i> Copy`;
                btnCopy.style.color = "#ff5722";
                btnCopy.style.borderColor = "#ff5722";
            }, 2000);
        });
    }
</script>
</body>
</html>
